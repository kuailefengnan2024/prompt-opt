_base_: ../_base_/default.yaml

# T2I direct: optimizable document = prompt text

train:
  batch_size: 1
  accumulation: 1
  num_epochs: 4

evaluation:
  sel_env_num: 0
  test_env_num: 0

env:
  name: t2i
  mode: direct
  prompt_init: promptopt/envs/t2i/prompts/initial.md
  best_prompt_file: best_prompt.md
  prompt_version_dir: prompts
  prompt_version_prefix: prompt_v
  split_mode: split_dir
  split_dir: data/t2i_split
  train_runs: 8
  gate_runs: 8
  workers: 4
  limit: 0
