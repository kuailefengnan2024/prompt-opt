_base_: ../_base_/default.yaml

# T2I prompt optimization (skillopt/envs/t2i/ pending)
# mode: direct  — skill document is the T2I prompt text → direct T2I
# mode: meta    — skill document is prompt-writing rules → LLM(skill+brief) → T2I (future)

train:
  batch_size: 1
  accumulation: 1
  num_epochs: 4

evaluation:
  sel_env_num: 0
  test_env_num: 0

env:
  name: t2i
  mode: direct
  skill_init: skillopt/envs/t2i/skills/initial.md
  split_mode: split_dir
  split_dir: data/t2i_split
  train_seeds: 8
  gate_seeds: 8
  workers: 4
  limit: 0
